<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>專業請假系統</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{ font-family:"Helvetica Neue",Arial,sans-serif; background:#f0f2f5; padding:15px; }
h2{ margin-bottom:10px; }
#leaveInfo{ margin-bottom:15px; font-size:18px; color:#333; }
button{ padding:14px 26px; border:none; border-radius:10px; cursor:pointer; font-size:20px; }
.btn-success{ background:#4caf50; color:white; }

/* 表格 */
table{ width:100%; border-collapse:collapse; font-size:21px; margin-top:20px; }
th, td{ border:1px solid #ddd; padding:12px; text-align:center; white-space:nowrap; }
th{ background:#f7f7f7; font-weight:bold; }

/* 狀態 */
.badge-未簽核{ background:#f44336;color:white;padding:6px 12px;border-radius:6px;font-size:18px;}
.badge-簽核中{ background:#ff9800;color:white;padding:6px 12px;border-radius:6px;font-size:18px;}
.badge-已簽核{ background:#4caf50;color:white;padding:6px 12px;border-radius:6px;font-size:18px;}

.swal-btn { font-size:18px !important; padding:12px 24px !important; border-radius:10px !important; }

/* 手機卡片 */
@media (max-width:768px){
  table{ display:none; }
  #leaveCardList{ display:block; }
  .card{ background:#fff; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1); font-size:20px; line-height:1.7; }
  .card-row{ margin-bottom:6px; }
  .label{ font-weight:bold; color:#555; }
  .card.簽核中{ border-left:6px solid #ff9800; }
  .card.已簽核{ border-left:6px solid #4caf50; }
  .card.未簽核{ border-left:6px solid #f44336; }
}
</style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>
<div id="leaveInfo"></div>
<button id="btnLeaveApply" class="btn-success">申請請假</button>

<!-- 桌機表格 -->
<table>
<thead>
<tr>
<th>員工姓名</th><th>假別</th><th>事由</th>
<th>起始日期</th><th>起始時間</th>
<th>終止日期</th><th>終止時間</th>
<th>請假時數</th><th>簽核狀態</th>
</tr>
</thead>
<tbody id="leaveRecordTable">
<tr><td colspan="9">載入中...</td></tr>
</tbody>
</table>

<!-- 手機卡片 -->
<div id="leaveCardList" style="display:none;"></div>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxG9vuggEcNgZRvBbh25dHpGbs19_eoICFOkqJ92YdGwRNMZZwW9JYGylTsmyMEsnvc/exec";

let userId="", userName="";
let leaveTypes=[];

/* 時間格式 */
function formatTime(t){
  if(!t) return "";
  const d=new Date(t);
  if(isNaN(d)) return t;
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* 計算時數 + 自動扣午休 */
function calcLeaveHours(startDate,startTime,endDate,endTime){
  const start=new Date(`${startDate}T${startTime}`);
  const end=new Date(`${endDate}T${endTime}`);
  if(end<start) return 0;
  let hours=(end-start)/3600000;

  // 扣除午休 (12:00~13:00)
  const lunchStart=new Date(`${startDate}T12:00`);
  const lunchEnd=new Date(`${startDate}T13:00`);
  if(start<lunchEnd && end>lunchStart) hours-=1;

  return Math.max(0,hours.toFixed(2));
}

/* 初始化 */
async function initLIFF(){
  try{
    await liff.init({ liffId:"2009444587-t79pfL2A" });
    if(!liff.isLoggedIn()) await liff.login();

    const profile=await liff.getProfile();
    userId=profile.userId;
    userName=profile.displayName;
    userInfo.textContent=`${userName} 您好`;

    await loadLeaveTypes();
    await loadLeaveInfo();
    loadLeaveRecords();

  }catch(e){ userInfo.textContent="請在 LINE 開啟"; }
}

/* 假別 */
async function loadLeaveTypes(){
  const res=await fetch(`${API_ENDPOINT}?action=getLeaveTypes`);
  leaveTypes=(await res.json()).filter(t=>t!=="假別");
}

/* 年假 */
async function loadLeaveInfo(){
  const res=await fetch(`${API_ENDPOINT}?action=getUserLeaveInfo&userId=${userId}`);
  const d=await res.json();
  leaveInfo.innerHTML=`📊 累計年假：${d.total}　剩餘年假：${d.remain}　已休年假：${d.used}`;
}

/* 紀錄 */
async function loadLeaveRecords(){
  const tbody=document.getElementById("leaveRecordTable");
  const cardList=document.getElementById("leaveCardList");
  tbody.innerHTML="<tr><td colspan='9'>載入中...</td></tr>";
  cardList.innerHTML="";

  try{
    const res=await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
    const data=await res.json();
    if(!data.length){
      tbody.innerHTML="<tr><td colspan='9'>無資料</td></tr>";
      cardList.innerHTML="<div class='card'>無資料</div>";
      return;
    }

    const frag=document.createDocumentFragment();
    data.forEach(r=>{
      const cls=r.signStatus==="未簽核"?"badge-未簽核":
                r.signStatus==="簽核中"?"badge-簽核中":"badge-已簽核";

      /* 表格 */
      const row=document.createElement("tr");
      row.innerHTML=`
        <td>${r.userName}</td>
        <td>${r.leaveType}</td>
        <td>${r.leaveReason}</td>
        <td>${r.startDate}</td>
        <td>${formatTime(r.startTime)}</td>
        <td>${r.endDate}</td>
        <td>${formatTime(r.endTime)}</td>
        <td>${r.leaveHours}</td>
        <td><span class="${cls}">${r.signStatus}</span></td>
      `;
      frag.appendChild(row);

      /* 手機卡片 */
      const card=document.createElement("div");
      card.className=`card ${r.signStatus}`;
      card.innerHTML=`
        <div class="card-row"><span class="label">姓名：</span>${r.userName}</div>
        <div class="card-row"><span class="label">假別：</span>${r.leaveType}</div>
        <div class="card-row"><span class="label">事由：</span>${r.leaveReason}</div>
        <div class="card-row"><span class="label">開始：</span>${r.startDate} ${formatTime(r.startTime)}</div>
        <div class="card-row"><span class="label">結束：</span>${r.endDate} ${formatTime(r.endTime)}</div>
        <div class="card-row"><span class="label">時數：</span>${r.leaveHours}</div>
        <div class="card-row"><span class="label">狀態：</span><span class="${cls}">${r.signStatus}</span></div>
      `;
      cardList.appendChild(card);
    });
    tbody.innerHTML=""; tbody.appendChild(frag);

  }catch(e){ tbody.innerHTML="<tr><td colspan='9'>錯誤</td></tr>"; }
}

/* 請假 */
btnLeaveApply.onclick=async()=>{

  const info=await (await fetch(`${API_ENDPOINT}?action=getUserLeaveInfo&userId=${userId}`)).json();
  const optionsHTML=leaveTypes.map(t=>`<option>${t}</option>`).join("");

  Swal.fire({
    title:'請假申請',
    width:520,
    html:`
    <div style="display:flex;flex-direction:column;gap:16px;font-size:18px;text-align:left;">
      <div style="color:#4caf50;font-weight:bold;">剩餘：${info.remain}</div>

      <button type="button" id="btnToday" style="width:100%;padding:10px;background:#2196F3;color:#fff;border:none;border-radius:6px;font-size:18px;margin-bottom:10px;">一鍵請今天</button>

      <label>假別</label>
      <select id="leaveType" style="width:100%;height:45px;font-size:18px;">${optionsHTML}</select>

      <label>事由</label>
      <input id="leaveReason" style="width:100%;height:45px;font-size:18px;">

      <label>起始日期</label>
      <input type="date" id="leaveStartDate" style="width:100%;height:45px;">

      <label>起始時間</label>
      <input type="time" id="leaveStartTime" value="09:00" style="width:100%;height:45px;">

      <label>終止日期</label>
      <input type="date" id="leaveEndDate" style="width:100%;height:45px;">

      <label>終止時間</label>
      <input type="time" id="leaveEndTime" value="18:00" style="width:100%;height:45px;">

      <label>時數</label>
      <input id="leaveHours" readonly style="width:100%;height:45px;">
    </div>
    `,
    showCancelButton:true,

    didOpen:()=>{
      const calc=()=>{ leaveHours.value=calcLeaveHours(leaveStartDate.value,leaveStartTime.value,leaveEndDate.value,leaveEndTime.value); };
      [leaveStartDate,leaveStartTime,leaveEndDate,leaveEndTime].forEach(el=>el.onchange=calc);

      document.getElementById("btnToday").onclick=()=>{
        const today=new Date().toISOString().slice(0,10);
        leaveStartDate.value=today;
        leaveEndDate.value=today;
        leaveStartTime.value="09:00";
        leaveEndTime.value="18:00";
        calc();
      };
    },

    preConfirm:()=>{
      if(!leaveReason.value) return Swal.showValidationMessage("請填事由");
      if(leaveType.value==="特休" && leaveHours.value>info.remain)
        return Swal.showValidationMessage("超過剩餘");
      return {
        leaveType:leaveType.value,
        leaveReason:leaveReason.value,
        startDate:leaveStartDate.value,
        startTime:leaveStartTime.value,
        endDate:leaveEndDate.value,
        endTime:leaveEndTime.value,
        leaveHours:leaveHours.value
      };
    }

  }).then(async r=>{
    if(!r.isConfirmed) return;

    await fetch(API_ENDPOINT,{
      method:"POST",
      body:JSON.stringify({userId,userName,...r.value})
    });

    Swal.fire({icon:"success",title:"完成",timer:1200,showConfirmButton:false});
    loadLeaveRecords();
    loadLeaveInfo();
  });
};

window.onload=initLIFF;
</script>

</body>
</html>
