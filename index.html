<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>專業請假系統</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body{ font-family:"Helvetica Neue",Arial,sans-serif; background:#f0f2f5; padding:15px; }
  h2{ margin-bottom:20px; }
  button{ padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-size:16px; }
  .btn-success{ background:#4caf50; color:white; }
  table{ width:100%; border-collapse:collapse; font-size:14px; margin-top:20px; }
  th, td{ border:1px solid #ddd; padding:8px; text-align:center; }
  th{ background:#f7f7f7; font-weight:bold; }
  .badge-未簽核{ background:#f44336;color:white;padding:3px 8px;border-radius:5px; }
  .badge-簽核中{ background:#ff9800;color:white;padding:3px 8px;border-radius:5px; }
  .badge-已簽核{ background:#4caf50;color:white;padding:3px 8px;border-radius:5px; }
</style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>
<button id="btnLeaveApply" class="btn-success">申請請假</button>

<table>
<thead>
<tr>
<th>員工姓名</th><th>假別</th><th>事由</th>
<th>起始日期</th><th>起始時間</th>
<th>終止日期</th><th>終止時間</th>
<th>請假時數</th><th>簽核狀態</th>
</tr>
</thead>
<tbody id="leaveRecordTable">
<tr><td colspan="9">載入中...</td></tr>
</tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbz9fHvxAGRjcGGWiGm84flTSPPQb5glrbcdSnDGZ-hXpqEGSbFl7jxE0--VCBhO1Yrv/exec";
let userId = "", userName = "";

// LIFF 初始化
async function initLIFF(){
  try{
    await liff.init({ liffId:"2009444587-t79pfL2A" });
    if(!liff.isLoggedIn()) await liff.login();

    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;
    document.getElementById("userInfo").textContent = `${userName} 您好`;

    loadLeaveRecords();

  }catch(err){
    console.error(err);
    document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
  }
}

// 載入請假紀錄
async function loadLeaveRecords(){
  const tbody = document.getElementById("leaveRecordTable");
  tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";
  try{
    const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
    const data = await res.json();
    if(!data.length){ tbody.innerHTML = "<tr><td colspan='9'>無請假紀錄</td></tr>"; return; }

    data.sort((a,b)=>{
      const statusOrder={'未簽核':0,'簽核中':1,'已簽核':2};
      if(a.signStatus===b.signStatus) return new Date(b.startDate)-new Date(a.startDate);
      return statusOrder[a.signStatus]-statusOrder[b.signStatus];
    });

    const frag=document.createDocumentFragment();
    data.forEach(r=>{
      const row=document.createElement("tr");
      let cls=''; 
      if(r.signStatus==='未簽核') cls='badge-未簽核';
      else if(r.signStatus==='簽核中') cls='badge-簽核中';
      else if(r.signStatus==='已簽核') cls='badge-已簽核';
      row.innerHTML=`
        <td>${r.userName}</td>
        <td>${r.leaveType}</td>
        <td>${r.leaveReason}</td>
        <td>${r.startDate}</td>
        <td>${r.startTime}</td>
        <td>${r.endDate}</td>
        <td>${r.endTime}</td>
        <td>${r.leaveHours}</td>
        <td><span class="${cls}">${r.signStatus}</span></td>
      `;
      frag.appendChild(row);
    });
    tbody.innerHTML=""; tbody.appendChild(frag);
  }catch(err){
    console.error(err);
    tbody.innerHTML="<tr><td colspan='9'>讀取失敗</td></tr>";
  }
}

// 申請請假按鈕
document.getElementById("btnLeaveApply").onclick=()=>{
  Swal.fire({
    title:'📝 請假申請',
    html:`
      <div style="display:flex; flex-direction:column; gap:10px; text-align:left; font-size:16px;">
        <label>假別</label>
        <select id="leaveType" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;">
          <option>特休</option><option>事假</option><option>病假</option>
          <option>公假</option><option>婚假</option><option>喪假</option><option>生理假</option>
        </select>
        <label>事由</label>
        <input type="text" id="leaveReason" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;" placeholder="請輸入請假事由">
        <label>起始日期</label><input type="date" id="leaveStartDate" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;">
        <label>起始時間</label><input type="time" id="leaveStartTime" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;" value="09:00">
        <label>終止日期</label><input type="date" id="leaveEndDate" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;">
        <label>終止時間</label><input type="time" id="leaveEndTime" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;" value="18:00">
        <label>請假時數</label><input type="number" id="leaveHours" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;" readonly>
      </div>
    `,
    showCancelButton:true,
    confirmButtonText:'送出',
    cancelButtonText:'取消',
    didOpen:()=>{
      const startDateEl=document.getElementById("leaveStartDate");
      const startTimeEl=document.getElementById("leaveStartTime");
      const endDateEl=document.getElementById("leaveEndDate");
      const endTimeEl=document.getElementById("leaveEndTime");
      const leaveHoursEl=document.getElementById("leaveHours");
      function calcHours(){
        if(!startDateEl.value||!startTimeEl.value||!endDateEl.value||!endTimeEl.value) return;
        const start=new Date(`${startDateEl.value}T${startTimeEl.value}:00`);
        const end=new Date(`${endDateEl.value}T${endTimeEl.value}:00`);
        leaveHoursEl.value = ((end-start)/(1000*60*60)).toFixed(2);
      }
      [startDateEl,startTimeEl,endDateEl,endTimeEl].forEach(el=>el.addEventListener("change",calcHours));
      calcHours();
    },
    preConfirm:()=>{
      const leaveType=document.getElementById("leaveType").value;
      const leaveReason=document.getElementById("leaveReason").value.trim();
      const leaveStartDate=document.getElementById("leaveStartDate").value;
      const leaveStartTime=document.getElementById("leaveStartTime").value;
      const leaveEndDate=document.getElementById("leaveEndDate").value;
      const leaveEndTime=document.getElementById("leaveEndTime").value;
      const leaveHours=document.getElementById("leaveHours").value;
      if(!leaveReason||!leaveStartDate||!leaveStartTime||!leaveEndDate||!leaveEndTime){
        Swal.showValidationMessage("請填完整資料"); return false;
      }
      if(new Date(`${leaveStartDate}T${leaveStartTime}:00`)>=new Date(`${leaveEndDate}T${leaveEndTime}:00`)){
        Swal.showValidationMessage("結束時間必須大於開始時間"); return false;
      }
      return {leaveType,leaveReason,leaveStartDate,leaveStartTime,leaveEndDate,leaveEndTime,leaveHours};
    }
  }).then(async(result)=>{
    if(!result.isConfirmed) return;
    const data=result.value;
    try{
      const res=await fetch(API_ENDPOINT,{method:"POST",body:JSON.stringify({
        action:"leave",
        userId,userName,
        leaveType:data.leaveType,
        leaveReason:data.leaveReason,
        startDate:data.leaveStartDate,
        startTime:data.leaveStartTime,
        endDate:data.leaveEndDate,
        endTime:data.leaveEndTime,
        leaveHours:data.leaveHours
      })});
      const json=await res.json();
      if(json.success){
        Swal.fire({icon:"success",title:json.message||"請假申請完成",timer:1500,showConfirmButton:false});
        loadLeaveRecords();
      }else{
        Swal.fire({icon:"error",title:json.message||"請假申請失敗",timer:1500,showConfirmButton:false});
      }
    }catch(err){
      console.error(err);
      Swal.fire({icon:"error",title:"請假申請失敗",timer:1500,showConfirmButton:false});
    }
  });
};

window.onload=initLIFF;
</script>

</body>
</html>
