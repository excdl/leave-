<!DOCTYPE html> 
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:Arial,sans-serif;padding:20px;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #ccc;padding:8px;text-align:center;}
    th{background:#f4f4f4;}
    input,button,select{padding:5px;margin:5px;}
    .waiting{color:orange;font-weight:bold;}
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<div>
  日期篩選：
  <input type="date" id="startDate"> 至 
  <input type="date" id="endDate">
  <button id="btnSearch">查詢</button>
  <button id="btnClear">清除</button>
</div>

<div style="margin-top:10px; border:1px solid #ccc; padding:10px;">
  <h4>請假申請：</h4>
  假別：
  <select id="leaveType">
    <option value="病假">病假</option>
    <option value="事假">事假</option>
    <option value="年假">年假</option>
  </select>
  事由：
  <input type="text" id="leaveReason" placeholder="請輸入請假事由">

  起始日期：
  <input type="date" id="startDateInput">
  起始時間：
  <input type="time" id="startTimeInput">
  
  終止日期：
  <input type="date" id="endDateInput">
  終止時間：
  <input type="time" id="endTimeInput">
  
  請假時數：
  <input type="number" id="leaveHours" placeholder="請假時數">

  <button id="btnLeaveSubmit">送出請假申請</button>
</div>

<table>
  <thead>
    <tr>
      <th>假別</th>
      <th>事由</th>
      <th>起始日期</th>
      <th>起始時間</th>
      <th>終止日期</th>
      <th>終止時間</th>
      <th>請假時數</th>
      <th>簽核狀態</th>
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan='8'>載入中...</td></tr>
  </tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbym4GZK5EZdfd4hTnopQpean1uQT5TIMoFnZYalFJhz6V4vzr4wAO9PRdDameGwidy9/exec";
let userId = "";
let userName = "";

// ========================
// 前端：簡化時間日期格式化
// ========================
function fixDate(t){
  if(!t) return "";
  return t;
}

function fixTime(t){
  if(!t) return "";
  return t;
}

async function initLIFF(){
  try{
    await liff.init({ liffId: "2008786085-L1CtKqqv" });
    if(!liff.isLoggedIn()) await liff.login();
    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;
    document.getElementById("userInfo").textContent = `${userName} 您好`;

    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
    const lastDay  = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
    document.getElementById("startDate").value = firstDay;
    document.getElementById("endDate").value = lastDay;
    loadLeaveRecords(firstDay,lastDay);

  }catch(err){
    console.error(err);
    document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
  }
}

async function loadLeaveRecords(start="", end=""){
  const tbody = document.getElementById("leaveRecordTable");
  tbody.innerHTML = "<tr><td colspan='8'>載入中...</td></tr>";

  try {
    const sDate = start || new Date().toISOString().slice(0,10);
    const eDate = end || sDate;

    const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}&start=${sDate}&end=${eDate}`);
    const data = await res.json();

    if(!data.length) {
      tbody.innerHTML = "<tr><td colspan='8'>無紀錄</td></tr>";
      return;
    }

    const fragment = document.createDocumentFragment();
    data.forEach(r => {
      const row = document.createElement("tr");
      const status = r.簽核1 && r.簽核2 ? "已簽核" : (r.簽核1 === "核准" ? "簽核中" : "未審核");
      row.innerHTML = `
        <td>${r.假別}</td>
        <td>${r.事由}</td>
        <td>${fixDate(r.起始日期)}</td>
        <td>${fixTime(r.起始時間)}</td>
        <td>${fixDate(r.終止日期)}</td>
        <td>${fixTime(r.終止時間)}</td>
        <td>${r.請假時數}</td>
        <td>${status}</td>
      `;
      fragment.appendChild(row);
    });

    tbody.innerHTML = "";
    tbody.appendChild(fragment);

  } catch(err) {
    console.error(err);
    tbody.innerHTML = "<tr><td colspan='8'>讀取失敗</td></tr>";
  }
}

// 請假申請
document.getElementById("btnLeaveSubmit").onclick = async ()=>{

  const leaveType = document.getElementById("leaveType").value;
  const leaveReason = document.getElementById("leaveReason").value.trim();
  const startDate = document.getElementById("startDateInput").value;
  const startTime = document.getElementById("startTimeInput").value;
  const endDate = document.getElementById("endDateInput").value;
  const endTime = document.getElementById("endTimeInput").value;
  const leaveHours = document.getElementById("leaveHours").value;

  if(!leaveReason || !startDate || !startTime || !endDate || !endTime || !leaveHours)
    return Swal.fire({icon:"info",title:"請填寫完整資料",timer:1500,showConfirmButton:false});

  try{
    const res = await fetch(API_ENDPOINT,{
      method:"POST",
      body: JSON.stringify({ 
        action:"leave", 
        userId, 
        userName, 
        leaveType, 
        leaveReason, 
        startDate, 
        startTime, 
        endDate, 
        endTime, 
        leaveHours 
      })
    });

    const data = await res.json();
    Swal.fire({icon:"success",title:data.message || "請假申請成功",timer:1500,showConfirmButton:false});
    loadLeaveRecords();

  }catch{
    Swal.fire({icon:"error",title:"請假申請失敗",timer:1500,showConfirmButton:false});
  }
};

document.getElementById("btnSearch").onclick = ()=> {
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;
  if(!start || !end) return Swal.fire({icon:"info",title:"請選擇完整日期範圍",timer:1500,showConfirmButton:false});
  loadLeaveRecords(start, end);
};

document.getElementById("btnClear").onclick = ()=> {
  document.getElementById("startDate").value = "";
  document.getElementById("endDate").value = "";
  loadLeaveRecords();
};

window.onload = initLIFF;
</script>
</body>
</html>
