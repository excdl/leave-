<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:Arial,sans-serif;padding:20px;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #ccc;padding:8px;text-align:center;}
    th{background:#f4f4f4;}
    input,button,select{padding:5px;margin:5px;}
    .waiting{color:orange;font-weight:bold;}
    .controls { padding: 20px; border: 1px solid #ccc; margin-top: 20px; }
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<!-- 日期篩選區域 -->
<div>
  日期篩選：
  <input type="date" id="startDate"> 至
  <input type="date" id="endDate">
  <button id="btnSearch">查詢</button>
  <button id="btnClear">清除</button>
</div>

<!-- 請假申請區域 -->
<div class="controls">
  <input id="leaveName" placeholder="員工姓名" readonly>
  <select id="leaveType">
    <option>特休</option>
    <option>事假</option>
    <option>病假</option>
    <option>公假</option>
    <option>婚假</option>
    <option>喪假</option>
    <option>生理假</option>
  </select>
  <input id="leaveReason" placeholder="事由">
  <input type="date" id="leaveStartDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveStartTime" value="09:00" onchange="calculateLeaveHours()">
  <input type="date" id="leaveEndDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveEndTime" value="18:00" onchange="calculateLeaveHours()">
  <input type="number" id="leaveHours" placeholder="請假時數" style="width:80px" readonly>
  <button id="submitLeaveBtn" onclick="submitLeave()">送出請假</button>
  <button onclick="window.open('https://excdl.github.io/leave-and-sign/','_blank')">查看請假 | 簽核</button>
</div>

<!-- 載入請假紀錄表格 -->
<table>
  <thead>
    <tr>
      <th>請假日期</th>
      <th>假別</th>
      <th>事由</th>
      <th>起始時間</th>
      <th>結束時間</th>
      <th>請假時數</th>
      <th>簽核1</th>
      <th>簽核人1</th>
      <th>簽核日期1</th>
      <th>簽核2</th>
      <th>簽核人2</th>
      <th>簽核日期2</th>
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan='12'>載入中...</td></tr>
  </tbody>
</table>

<script>
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbwKAxPnNCo2iist5CRdoAaPmfeX8SYiZaZmvzdrqoiis17mezt2IlUJ6H0llu0qjAp6/exec";
  let userId = "";
  let userName = "";

  // 初始化 LIFF，獲取 LINE ID 和用戶資料
  async function initLIFF() {
    try {
      await liff.init({ liffId: "2008786085-L1CtKqqv" });
      if (!liff.isLoggedIn()) await liff.login();  // 如果未登錄，則引導登錄

      const profile = await liff.getProfile();
      userId = profile.userId;
      userName = profile.displayName;

      document.getElementById("userInfo").textContent = `${userName} 您好`;
      document.getElementById("leaveName").value = userName;
    } catch (err) {
      console.error(err);
      document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
    }
  }

  // 計算請假時數（簡單計算：結束時間 - 開始時間）
  function calculateLeaveHours() {
    const startDate = document.getElementById("leaveStartDate").value;
    const startTime = document.getElementById("leaveStartTime").value;
    const endDate = document.getElementById("leaveEndDate").value;
    const endTime = document.getElementById("leaveEndTime").value;

    if (!startDate || !startTime || !endDate || !endTime) return;

    const start = new Date(`${startDate}T${startTime}:00`);
    const end = new Date(`${endDate}T${endTime}:00`);
    
    const diffInMs = end - start;
    const hours = (diffInMs / (1000 * 60 * 60)).toFixed(2);

    document.getElementById("leaveHours").value = hours;
  }

  // 提交請假申請
  async function submitLeave() {
    const leaveType = document.getElementById("leaveType").value;
    const leaveReason = document.getElementById("leaveReason").value;
    const leaveStartDate = document.getElementById("leaveStartDate").value;
    const leaveStartTime = document.getElementById("leaveStartTime").value;
    const leaveEndDate = document.getElementById("leaveEndDate").value;
    const leaveEndTime = document.getElementById("leaveEndTime").value;
    const leaveHours = document.getElementById("leaveHours").value;

    if (!leaveStartDate || !leaveStartTime || !leaveEndDate || !leaveEndTime || !leaveReason) {
      return Swal.fire({ icon: "info", title: "請填完整資料", timer: 1500, showConfirmButton: false });
    }

    try {
      const res = await fetch(API_ENDPOINT, {
        method: "POST",
        body: JSON.stringify({
          action: "leave",
          userId,
          userName,
          date: leaveStartDate,
          startTime: leaveStartTime,
          endTime: leaveEndTime,
          leaveType,
          leaveReason,
          leaveHours
        })
      });

      const data = await res.json();
      console.log("API 返回數據:", data);

      if (data.success) {
        Swal.fire({ icon: "success", title: data.message || "請假申請完成", timer: 1500, showConfirmButton: false });
      } else {
        Swal.fire({ icon: "error", title: data.message || "請假申請失敗", timer: 1500, showConfirmButton: false });
      }

      document.getElementById("leaveReason").value = "";
      document.getElementById("leaveStartDate").value = "";
      document.getElementById("leaveStartTime").value = "09:00";
      document.getElementById("leaveEndDate").value = "";
      document.getElementById("leaveEndTime").value = "18:00";
      document.getElementById("leaveHours").value = "";

    } catch (err) {
      console.error("請假申請錯誤: ", err);
      Swal.fire({ icon: "error", title: "請假申請失敗", text: err.message, timer: 1500, showConfirmButton: false });
    }
  }

  // 當用戶點擊查詢按鈕時，載入指定日期範圍的請假記錄
  document.getElementById("btnSearch").addEventListener("click", function() {
    const startDate = document.getElementById("startDate").value;
    const endDate = document.getElementById("endDate").value;

    if (startDate && endDate) {
      loadLeaveRecords(startDate, endDate);  // 查詢請假紀錄
    } else {
      Swal.fire({ icon: "info", title: "請選擇日期範圍", timer: 1500, showConfirmButton: false });
    }
  });

  // ========================
  // 載入請假紀錄
  // ========================
  async function loadLeaveRecords(start="", end="") {
    const tbody = document.getElementById("leaveRecordTable");
    tbody.innerHTML = "<tr><td colspan='12'>載入中...</td></tr>";

    try {
      const sDate = start || new Date().toISOString().slice(0, 10);
      const eDate = end || sDate;

      const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}&start=${sDate}&end=${eDate}`);
      const data = await res.json();

      if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='12'>無請假紀錄</td></tr>";
        return;
      }

      const fragment = document.createDocumentFragment();
      data.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${r.startDate}</td>
          <td>${r.leaveType}</td>
          <td>${r.reason}</td>
          <td>${r.startTime}</td>
          <td>${r.endTime}</td>
          <td>${r.leaveHours}</td>
          <td>${r.sign1Status}</td>
          <td>${r.sign1Name}</td>
          <td>${r.sign1Date}</td>
          <td>${r.sign2Status}</td>
          <td>${r.sign2Name}</td>
          <td>${r.sign2Date}</td>
        `;
        fragment.appendChild(row);
      });

      tbody.innerHTML = "";
      tbody.appendChild(fragment);

    } catch (err) {
      console.error("載入請假紀錄錯誤: ", err);
      tbody.innerHTML = "<tr><td colspan='12'>讀取失敗</td></tr>";
    }
  }

  // 初始化 LIFF
  window.onload = initLIFF;
</script>

</body>
</html>
