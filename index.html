<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>請假紀錄</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  th { background: #f4f4f4; }
  .badge-未簽核 { background-color: red; color: white; padding: 5px 10px; border-radius: 5px; }
  .badge-簽核中 { background-color: orange; color: white; padding: 5px 10px; border-radius: 5px; }
  .badge-已簽核 { background-color: green; color: white; padding: 5px 10px; border-radius: 5px; }
  button { padding: 8px 16px; margin: 5px; cursor: pointer; }
</style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<!-- 請假申請按鈕 -->
<div>
  <button id="btnLeaveApply" class="btn-success">新增請假</button>
</div>

<!-- 顯示請假紀錄表格 -->
<table>
  <thead>
    <tr>
      <th>員工姓名</th>
      <th>假別</th>
      <th>事由</th>
      <th>起始日期</th>
      <th>起始時間</th>
      <th>終止日期</th>
      <th>終止時間</th>
      <th>請假時數</th>
      <th>簽核狀態</th>
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan="9">載入中...</td></tr>
  </tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzN5EWz9SO9pDQ55qZerw9x2bqBq9_uXmtmPnlCrscF20Oau7fGARO8j8zs8fFEunhx/exec";
let userId = "";
let userName = "";

// 初始化 LIFF
async function initLIFF() {
  try {
    await liff.init({ liffId: "2009444587-t79pfL2A" });
    if (!liff.isLoggedIn()) await liff.login();

    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;
    document.getElementById("userInfo").textContent = `${userName} 您好`;

    loadLeaveRecords();
  } catch (err) {
    console.error(err);
    document.getElementById("userInfo").textContent = "無法取得使用者資訊";
  }
}

// 彈跳請假表單
document.getElementById("btnLeaveApply").onclick = () => {
  Swal.fire({
    html: `
      <div style="text-align:left;">
        <h3 style="margin-bottom:12px;">📝 請假申請</h3>
        <form id="leaveForm">
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">假別</label>
            <select id="leaveType" style="flex:1;padding:6px;">
              <option>特休</option>
              <option>事假</option>
              <option>病假</option>
              <option>公假</option>
              <option>婚假</option>
              <option>喪假</option>
              <option>生理假</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">事由</label>
            <input id="leaveReason" style="flex:1;padding:6px;" placeholder="請輸入請假事由">
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">起始日期</label>
            <input type="date" id="leaveStartDate" style="flex:1;" onchange="calculateLeaveHours()">
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">起始時間</label>
            <input type="time" id="leaveStartTime" value="09:00" style="flex:1;" onchange="calculateLeaveHours()">
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">終止日期</label>
            <input type="date" id="leaveEndDate" style="flex:1;" onchange="calculateLeaveHours()">
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">終止時間</label>
            <input type="time" id="leaveEndTime" value="18:00" style="flex:1;" onchange="calculateLeaveHours()">
          </div>
          <div style="display:flex;align-items:center;margin-bottom:8px;">
            <label style="width:80px;text-align:right;margin-right:8px;">請假時數</label>
            <input type="number" id="leaveHours" style="flex:1;" readonly>
          </div>
        </form>
      </div>
    `,
    showConfirmButton: false,
    showCloseButton: true,
    didOpen: () => {
      window.calculateLeaveHours = () => {
        const startDate = document.getElementById("leaveStartDate").value;
        const startTime = document.getElementById("leaveStartTime").value;
        const endDate = document.getElementById("leaveEndDate").value;
        const endTime = document.getElementById("leaveEndTime").value;
        if (!startDate || !startTime || !endDate || !endTime) return;
        const start = new Date(`${startDate}T${startTime}:00`);
        const end = new Date(`${endDate}T${endTime}:00`);
        const hours = ( (end - start)/(1000*60*60) ).toFixed(2);
        document.getElementById("leaveHours").value = hours;
      };

      document.getElementById("leaveForm").onsubmit = async (e) => e.preventDefault();

      const submitBtn = document.createElement("button");
      submitBtn.textContent = "送出";
      submitBtn.className = "btn-success";
      submitBtn.style.marginRight = "8px";
      submitBtn.onclick = submitLeaveForm;

      const btnContainer = document.createElement("div");
      btnContainer.style.textAlign = "right";
      btnContainer.style.marginTop = "12px";
      btnContainer.appendChild(submitBtn);

      document.querySelector(".swal2-html-container").appendChild(btnContainer);
    }
  });
};

// 提交請假表單
async function submitLeaveForm() {
  const leaveType = document.getElementById("leaveType").value;
  const leaveReason = document.getElementById("leaveReason").value;
  const leaveStartDate = document.getElementById("leaveStartDate").value;
  const leaveStartTime = document.getElementById("leaveStartTime").value;
  const leaveEndDate = document.getElementById("leaveEndDate").value;
  const leaveEndTime = document.getElementById("leaveEndTime").value;
  const leaveHours = document.getElementById("leaveHours").value;

  if (!leaveReason || !leaveStartDate || !leaveStartTime || !leaveEndDate || !leaveEndTime) {
    return Swal.fire({ icon: "info", title: "請填完整資料", timer:1500, showConfirmButton:false });
  }

  try {
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      body: JSON.stringify({
        action:"leave",
        userId,
        userName,
        leaveType,
        leaveReason,
        startDate: leaveStartDate,
        startTime: leaveStartTime,
        endDate: leaveEndDate,
        endTime: leaveEndTime,
        leaveHours
      })
    });
    const data = await res.json();
    if (data.success) {
      Swal.fire({ icon:"success", title:data.message || "請假申請完成", timer:1500, showConfirmButton:false });
      loadLeaveRecords();
      Swal.close();
    } else {
      Swal.fire({ icon:"error", title:data.message || "請假申請失敗", timer:1500, showConfirmButton:false });
    }
  } catch (err) {
    console.error(err);
    Swal.fire({ icon:"error", title:"請假申請失敗", timer:1500, showConfirmButton:false });
  }
}

// 載入請假紀錄
async function loadLeaveRecords() {
  const tbody = document.getElementById("leaveRecordTable");
  tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";
  try {
    const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
    const data = await res.json();
    if (!data.length) { tbody.innerHTML = "<tr><td colspan='9'>無請假紀錄</td></tr>"; return; }
    tbody.innerHTML = "";
    data.forEach(r => {
      const tr = document.createElement("tr");
      let statusClass = r.signStatus==='未簽核'?'badge-未簽核':r.signStatus==='簽核中'?'badge-簽核中':'badge-已簽核';
      tr.innerHTML = `
        <td>${r.userName}</td>
        <td>${r.leaveType}</td>
        <td>${r.leaveReason}</td>
        <td>${r.startDate}</td>
        <td>${r.startTime}</td>
        <td>${r.endDate}</td>
        <td>${r.endTime}</td>
        <td>${r.leaveHours}</td>
        <td><span class="${statusClass}">${r.signStatus}</span></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error(err);
    tbody.innerHTML = "<tr><td colspan='9'>讀取失敗</td></tr>";
  }
}

window.onload = initLIFF;
</script>
</body>
</html>
