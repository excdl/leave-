<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>請假系統</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:15px;}
button{padding:12px 20px;border:none;border-radius:10px;background:#4caf50;color:#fff;font-size:18px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
.badge{padding:5px 10px;border-radius:6px;color:#fff;}
</style>
</head>

<body>

<h2 id="userInfo">載入中...</h2>
<h3 id="annualInfo"></h3>

<button onclick="openForm()">申請請假</button>

<table>
<thead>
<tr>
<th>姓名</th><th>假別</th><th>事由</th>
<th>起</th><th>迄</th><th>時數</th><th>狀態</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzfBWNQxEJ1wlnjyqZ3CZJqhkel0DMX5r18R-6GDHAUH_LdZDW9c5sjsvzbvejmDxok/exec";

let userId="", userName="";

// ===== 初始化 =====
async function init(){
  await liff.init({ liffId:"2009444587-t79pfL2A" });

  if(!liff.isLoggedIn()) liff.login();

  const p = await liff.getProfile();
  userId = p.userId;
  userName = p.displayName;

  userInfo.innerText = userName+" 您好";

  loadAnnual();
  loadRecords();
}

// ===== 年假 =====
async function loadAnnual(){
  const r = await fetch(`${API_ENDPOINT}?action=getUserInfo&userId=${userId}`);
  const d = await r.json();

  annualInfo.innerText = `年假：${d.total}｜已休：${d.used}｜剩餘：${d.remain}`;
}

// ===== 紀錄 =====
async function loadRecords(){
  const r = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
  const data = await r.json();

  tb.innerHTML="";

  data.forEach(x=>{
    tb.innerHTML += `
    <tr>
      <td>${x.userName}</td>
      <td>${x.leaveType}</td>
      <td>${x.leaveReason}</td>
      <td>${x.startDate}</td>
      <td>${x.endDate}</td>
      <td>${x.leaveHours}</td>
      <td>${x.signStatus}</td>
    </tr>`;
  });
}

// ===== 假別 =====
async function getTypes(){
  const r = await fetch(`${API_ENDPOINT}?action=getLeaveTypes`);
  return await r.json();
}

// ===== 表單 =====
async function openForm(){

  const types = await getTypes();

  let opts = types.map(t=>`<option>${t}</option>`).join("");

  Swal.fire({
    title:"請假",
    html:`
      <select id="t">${opts}</select>
      <input id="r" placeholder="事由">
      <input type="date" id="sd">
      <input type="time" id="st">
      <input type="date" id="ed">
      <input type="time" id="et">
      <input id="h" readonly>
    `,
    preConfirm:()=>{
      return {
        leaveType:t.value,
        leaveReason:r.value,
        startDate:sd.value,
        startTime:st.value,
        endDate:ed.value,
        endTime:et.value,
        leaveHours:h.value
      };
    },
    didOpen:()=>{
      [sd,st,ed,et].forEach(el=>{
        el.onchange=()=>{
          if(sd.value && st.value && ed.value && et.value){
            h.value = ((new Date(`${ed.value}T${et.value}`) - new Date(`${sd.value}T${st.value}`))/3600000).toFixed(1);
          }
        };
      });
    }
  }).then(async res=>{
    if(!res.isConfirmed) return;

    await fetch(API_ENDPOINT,{
      method:"POST",
      body:JSON.stringify({
        userId,userName,...res.value
      })
    });

    loadAnnual();
    loadRecords();
  });
}

init();
</script>

</body>
</html>
