<!DOCTYPE html> 
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>專業請假系統</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:#f0f2f5;
    padding:15px;
  }

  h2{ margin-bottom:20px; }

  button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
  }

  .btn-success{ background:#4caf50; color:white; }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    margin-top:20px;
  }

  th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
  }

  th{ background:#f7f7f7; font-weight:bold; }

  .badge-未簽核{ background:#f44336;color:white;padding:4px 10px;border-radius:6px; }
  .badge-簽核中{ background:#ff9800;color:white;padding:4px 10px;border-radius:6px; }
  .badge-已簽核{ background:#4caf50;color:white;padding:4px 10px;border-radius:6px; }

  /* ✅ Swal 按鈕放大 */
  .swal-btn {
    font-size:18px !important;
    padding:12px 24px !important;
    border-radius:10px !important;
  }
</style>
</head>

<body>

<h2 id="userInfo">載入中...</h2>
<button id="btnLeaveApply" class="btn-success">申請請假</button>

<table>
<thead>
<tr>
<th>員工姓名</th><th>假別</th><th>事由</th>
<th>起始日期</th><th>起始時間</th>
<th>終止日期</th><th>終止時間</th>
<th>請假時數</th><th>簽核狀態</th>
</tr>
</thead>
<tbody id="leaveRecordTable">
<tr><td colspan="9">載入中...</td></tr>
</tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxXzRP7xgyLpsAEqi9pejKjH0hI1I9vLuytiyIe5r4DGYU5sRPMeIKuE_FQZJ0QGjMm/exec";

let userId = "", userName = "";

// LIFF 初始化
async function initLIFF(){
  try{
    await liff.init({ liffId:"2009444587-t79pfL2A" });
    if(!liff.isLoggedIn()) await liff.login();

    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;

    document.getElementById("userInfo").textContent = `${userName} 您好`;

    loadLeaveRecords();

  }catch(err){
    console.error(err);
    document.getElementById("userInfo").textContent = "請在 LINE 開啟";
  }
}

// 載入請假紀錄
async function loadLeaveRecords(){
  const tbody = document.getElementById("leaveRecordTable");
  tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";

  try{
    const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
    const data = await res.json();

    if(!data.length){
      tbody.innerHTML = "<tr><td colspan='9'>無請假紀錄</td></tr>";
      return;
    }

    const frag=document.createDocumentFragment();

    data.forEach(r=>{
      const row=document.createElement("tr");

      let cls='';
      if(r.signStatus==='未簽核') cls='badge-未簽核';
      else if(r.signStatus==='簽核中') cls='badge-簽核中';
      else cls='badge-已簽核';

      row.innerHTML=`
        <td>${r.userName}</td>
        <td>${r.leaveType}</td>
        <td>${r.leaveReason}</td>
        <td>${r.startDate}</td>
        <td>${r.startTime}</td>
        <td>${r.endDate}</td>
        <td>${r.endTime}</td>
        <td>${r.leaveHours}</td>
        <td><span class="${cls}">${r.signStatus}</span></td>
      `;

      frag.appendChild(row);
    });

    tbody.innerHTML="";
    tbody.appendChild(frag);

  }catch(err){
    console.error(err);
    tbody.innerHTML="<tr><td colspan='9'>讀取失敗</td></tr>";
  }
}

// ✅ 請假彈窗（優化版）
document.getElementById("btnLeaveApply").onclick=()=>{

  Swal.fire({
    title:'📝 請假申請',
    width:520,

    html:`
      <div style="display:flex;flex-direction:column;gap:16px;font-size:18px;text-align:left;">

        <label>假別</label>
        <select id="leaveType" style="padding:14px;font-size:18px;border-radius:10px;">
          <option>特休</option><option>事假</option><option>病假</option>
          <option>公假</option><option>婚假</option><option>喪假</option><option>生理假</option>
        </select>

        <label>事由</label>
        <input id="leaveReason" placeholder="請輸入請假事由"
          style="padding:14px;font-size:18px;border-radius:10px;">

        <label>起始日期</label>
        <input type="date" id="leaveStartDate" style="padding:14px;font-size:18px;border-radius:10px;">

        <label>起始時間</label>
        <input type="time" id="leaveStartTime" value="09:00"
          style="padding:14px;font-size:18px;border-radius:10px;">

        <label>終止日期</label>
        <input type="date" id="leaveEndDate" style="padding:14px;font-size:18px;border-radius:10px;">

        <label>終止時間</label>
        <input type="time" id="leaveEndTime" value="18:00"
          style="padding:14px;font-size:18px;border-radius:10px;">

        <label>請假時數</label>
        <input id="leaveHours" readonly
          style="padding:14px;font-size:20px;font-weight:bold;background:#eee;border-radius:10px;">
      </div>
    `,

    showCancelButton:true,
    confirmButtonText:'送出',
    cancelButtonText:'取消',

    customClass:{
      confirmButton:'swal-btn',
      cancelButton:'swal-btn'
    },

    didOpen:()=>{
      const sD=leaveStartDate, sT=leaveStartTime, eD=leaveEndDate, eT=leaveEndTime;

      function calc(){
        if(!sD.value||!sT.value||!eD.value||!eT.value) return;
        leaveHours.value = ((new Date(`${eD.value}T${eT.value}`) - new Date(`${sD.value}T${sT.value}`)) / 3600000).toFixed(2);
      }

      [sD,sT,eD,eT].forEach(el=>el.addEventListener("change",calc));
    },

    preConfirm:()=>{
      if(!leaveReason.value || !leaveStartDate.value || !leaveEndDate.value){
        Swal.showValidationMessage("請填完整資料");
        return false;
      }

      return {
        leaveType:leaveType.value,
        leaveReason:leaveReason.value,
        startDate:leaveStartDate.value,
        startTime:leaveStartTime.value,
        endDate:leaveEndDate.value,
        endTime:leaveEndTime.value,
        leaveHours:leaveHours.value
      };
    }

  }).then(async(res)=>{

    if(!res.isConfirmed) return;

    const d=res.value;

    await fetch(API_ENDPOINT,{
      method:"POST",
      body:JSON.stringify({
        action:"leave",
        userId,userName,
        ...d
      })
    });

    Swal.fire({icon:"success",title:"完成",timer:1200,showConfirmButton:false});
    loadLeaveRecords();
  });
};

window.onload=initLIFF;
</script>

</body>
</html>
