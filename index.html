<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    input, button, select { padding: 5px; margin: 5px; }
    .waiting { color: orange; font-weight: bold; }
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<!-- 日期篩選區域 -->
<div>
  日期篩選：
  <input type="date" id="startDate"> 至
  <input type="date" id="endDate">
  <button id="btnSearch">查詢</button>
  <button id="btnClear">清除</button>
</div>

<!-- 顯示請假紀錄表格 -->
<table>
  <thead>
    <tr>
      <th>員工姓名</th>
      <th>假別</th>
      <th>事由</th>
      <th>起始日期</th>
      <th>起始時間</th>
      <th>終止日期</th>
      <th>終止時間</th>
      <th>請假時數</th>
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan="8">載入中...</td></tr>
  </tbody>
</table>

<script>
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxZ17Zv2GFO_VeMHgokqDttahGjbx9Kwrf7QOYobWYaySo5fmIz62Q8GJQkgE1iH-sz/exec";
  let userId = "";
  let userName = "";

  // 格式化日期
  function fixDate(t){
    if(!t) return "";
    return t;  // 預設資料已是 "yyyy/MM/dd" 格式
  }

  // 格式化時間
  function fixTime(t){
    if(!t) return "";
    return t;  // 預設資料已是 "HH:mm:ss" 格式
  }

  // 初始化 LIFF
  async function initLIFF() {
    try {
      await liff.init({ liffId: "2008786085-L1CtKqqv" });
      if (!liff.isLoggedIn()) await liff.login();
      const profile = await liff.getProfile();
      userId = profile.userId;
      userName = profile.displayName;
      document.getElementById("userInfo").textContent = `${userName} 您好`;

      const now = new Date();
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().slice(0, 10);
      document.getElementById("startDate").value = firstDay;
      document.getElementById("endDate").value = lastDay;
      loadLeaveRecords(firstDay, lastDay);

    } catch (err) {
      console.error(err);
      document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
    }
  }

  // 載入請假紀錄
  async function loadLeaveRecords(start="", end="") {
    const tbody = document.getElementById("leaveRecordTable");
    tbody.innerHTML = "<tr><td colspan='8'>載入中...</td></tr>";

    try {
      const sDate = start || new Date().toISOString().slice(0, 10);
      const eDate = end || sDate;

      const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}&start=${sDate}&end=${eDate}`);
      const data = await res.json();

      if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='8'>無請假紀錄</td></tr>";
        return;
      }

      const fragment = document.createDocumentFragment();
      data.forEach(r => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${r.userName}</td>
          <td>${r.leaveType}</td>
          <td>${r.leaveReason}</td>
          <td>${fixDate(r.startDate)}</td>
          <td>${fixTime(r.startTime)}</td>
          <td>${fixDate(r.endDate)}</td>
          <td>${fixTime(r.endTime)}</td>
          <td>${r.leaveHours}</td>
        `;
        fragment.appendChild(row);
      });

      tbody.innerHTML = "";
      tbody.appendChild(fragment);

    } catch (err) {
      console.error(err);
      tbody.innerHTML = "<tr><td colspan='8'>讀取失敗</td></tr>";
    }
  }

  // 查詢請假紀錄
  document.getElementById("btnSearch").onclick = () => {
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    if (!start || !end) return Swal.fire({ icon: "info", title: "請選擇完整日期範圍", timer: 1500, showConfirmButton: false });
    loadLeaveRecords(start, end);
  };

  // 清除篩選
  document.getElementById("btnClear").onclick = () => {
    document.getElementById("startDate").value = "";
    document.getElementById("endDate").value = "";
    loadLeaveRecords();
  };

  window.onload = initLIFF;
</script>

</body>
</html>
