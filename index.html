<!DOCTYPE html> 
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<!-- ✅ 手機不亂放大 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>專業請假系統</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  body{
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:#f0f2f5;
    padding:15px;
  }

  h2{ margin-bottom:10px; }

  #leaveInfo{
    margin-bottom:15px;
    font-size:16px;
    color:#333;
  }

  button{
    padding:12px 24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
  }

  .btn-success{ background:#4caf50; color:white; }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
    margin-top:20px;
  }

  th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
  }

  th{ background:#f7f7f7; font-weight:bold; }

  .badge-未簽核{ background:#f44336;color:white;padding:4px 10px;border-radius:6px; }
  .badge-簽核中{ background:#ff9800;color:white;padding:4px 10px;border-radius:6px; }
  .badge-已簽核{ background:#4caf50;color:white;padding:4px 10px;border-radius:6px; }

  .swal-btn {
    font-size:18px !important;
    padding:12px 24px !important;
    border-radius:10px !important;
  }
</style>
</head>

<body>

<h2 id="userInfo">載入中...</h2>

<!-- ✅ 新增年假資訊 -->
<div id="leaveInfo"></div>

<button id="btnLeaveApply" class="btn-success">申請請假</button>

<table>
<thead>
<tr>
<th>員工姓名</th><th>假別</th><th>事由</th>
<th>起始日期</th><th>起始時間</th>
<th>終止日期</th><th>終止時間</th>
<th>請假時數</th><th>簽核狀態</th>
</tr>
</thead>
<tbody id="leaveRecordTable">
<tr><td colspan="9">載入中...</td></tr>
</tbody>
</table>

<script>
const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxXzRP7xgyLpsAEqi9pejKjH0hI1I9vLuytiyIe5r4DGYU5sRPMeIKuE_FQZJ0QGjMm/exec";

let userId = "", userName = "";
let leaveTypes = [];

// =====================
// 初始化
// =====================
async function initLIFF(){
  try{
    await liff.init({ liffId:"2009444587-t79pfL2A" });
    if(!liff.isLoggedIn()) await liff.login();

    const profile = await liff.getProfile();
    userId = profile.userId;
    userName = profile.displayName;

    document.getElementById("userInfo").textContent = `${userName} 您好`;

    await loadLeaveTypes();
    await loadLeaveInfo();
    loadLeaveRecords();

  }catch(err){
    console.error(err);
    document.getElementById("userInfo").textContent = "請在 LINE 開啟";
  }
}

// =====================
// 取得假別
// =====================
async function loadLeaveTypes(){
  const res = await fetch(`${API_ENDPOINT}?action=getLeaveTypes`);
  leaveTypes = await res.json();
}

// =====================
// 年假資訊
// =====================
async function loadLeaveInfo(){
  const res = await fetch(`${API_ENDPOINT}?action=getUserLeaveInfo&userId=${userId}`);
  const d = await res.json();

  document.getElementById("leaveInfo").innerHTML = `
    📊 累計：${d.total} 小時　
    剩餘：${d.remain} 小時　
    已休：${d.used} 小時
  `;
}

// =====================
// 載入紀錄
// =====================
async function loadLeaveRecords(){
  const tbody = document.getElementById("leaveRecordTable");
  tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";

  try{
    const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
    const data = await res.json();

    if(!data.length){
      tbody.innerHTML = "<tr><td colspan='9'>無請假紀錄</td></tr>";
      return;
    }

    const frag=document.createDocumentFragment();

    data.forEach(r=>{
      const row=document.createElement("tr");

      let cls='';
      if(r.signStatus==='未簽核') cls='badge-未簽核';
      else if(r.signStatus==='簽核中') cls='badge-簽核中';
      else cls='badge-已簽核';

      row.innerHTML=`
        <td>${r.userName}</td>
        <td>${r.leaveType}</td>
        <td>${r.leaveReason}</td>
        <td>${r.startDate}</td>
        <td>${r.startTime}</td>
        <td>${r.endDate}</td>
        <td>${r.endTime}</td>
        <td>${r.leaveHours}</td>
        <td><span class="${cls}">${r.signStatus}</span></td>
      `;

      frag.appendChild(row);
    });

    tbody.innerHTML="";
    tbody.appendChild(frag);

  }catch(err){
    console.error(err);
    tbody.innerHTML="<tr><td colspan='9'>讀取失敗</td></tr>";
  }
}

// =====================
// 請假彈窗（升級版）
// =====================
document.getElementById("btnLeaveApply").onclick=async()=>{

  const infoRes = await fetch(`${API_ENDPOINT}?action=getUserLeaveInfo&userId=${userId}`);
  const info = await infoRes.json();

  const optionsHTML = leaveTypes.map(t=>`<option>${t}</option>`).join("");

  Swal.fire({
    title:'📝 請假申請',
    width:520,

    html:`
      <div style="display:flex;flex-direction:column;gap:16px;font-size:18px;text-align:left;">

        <div style="color:#4caf50;font-weight:bold;">
          剩餘年假：${info.remain} 小時
        </div>

        <label>假別</label>
        <select id="leaveType">${optionsHTML}</select>

        <label>事由</label>
        <input id="leaveReason">

        <label>起始日期</label>
        <input type="date" id="leaveStartDate">

        <label>起始時間</label>
        <input type="time" id="leaveStartTime" value="09:00">

        <label>終止日期</label>
        <input type="date" id="leaveEndDate">

        <label>終止時間</label>
        <input type="time" id="leaveEndTime" value="18:00">

        <label>請假時數</label>
        <input id="leaveHours" readonly>
      </div>
    `,

    showCancelButton:true,
    confirmButtonText:'送出',
    cancelButtonText:'取消',

    customClass:{
      confirmButton:'swal-btn',
      cancelButton:'swal-btn'
    },

    didOpen:()=>{
      const sD=leaveStartDate, sT=leaveStartTime, eD=leaveEndDate, eT=leaveEndTime;

      function calc(){
        if(!sD.value||!sT.value||!eD.value||!eT.value) return;
        leaveHours.value = ((new Date(`${eD.value}T${eT.value}`) - new Date(`${sD.value}T${sT.value}`)) / 3600000).toFixed(2);
      }

      [sD,sT,eD,eT].forEach(el=>el.addEventListener("change",calc));
    },

    preConfirm:()=>{
      if(!leaveReason.value || !leaveStartDate.value || !leaveEndDate.value){
        Swal.showValidationMessage("請填完整資料");
        return false;
      }

      // 🔥 年假限制
      if(leaveType.value==="特休" && Number(leaveHours.value) > info.remain){
        Swal.showValidationMessage(`剩餘 ${info.remain} 小時`);
        return false;
      }

      return {
        leaveType:leaveType.value,
        leaveReason:leaveReason.value,
        startDate:leaveStartDate.value,
        startTime:leaveStartTime.value,
        endDate:leaveEndDate.value,
        endTime:leaveEndTime.value,
        leaveHours:leaveHours.value
      };
    }

  }).then(async(res)=>{

    if(!res.isConfirmed) return;

    await fetch(API_ENDPOINT,{
      method:"POST",
      body:JSON.stringify({
        userId,userName,
        ...res.value
      })
    });

    Swal.fire({icon:"success",title:"完成",timer:1200,showConfirmButton:false});

    loadLeaveRecords();
    loadLeaveInfo(); // 🔥 更新年假
  });
};

// ✅ 收鍵盤恢復畫面
document.addEventListener("focusout", () => {
  window.scrollTo(0, 0);
});

window.onload=initLIFF;
</script>

</body>
</html>
