<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假申請</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body{font-family:Arial,sans-serif;padding:20px;}
    .controls{padding:20px;border:1px solid #ccc;}
    input, select, button {padding:8px;margin:10px 0;width:100%;}
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<div class="controls">
  <input id="leaveName" placeholder="員工姓名" readonly>
  <select id="leaveType">
    <option>特休</option>
    <option>事假</option>
    <option>病假</option>
    <option>公假</option>
    <option>婚假</option>
    <option>喪假</option>
    <option>生理假</option>
  </select>
  <input id="leaveReason" placeholder="事由">
  <input type="date" id="leaveStartDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveStartTime" value="09:00" onchange="calculateLeaveHours()">
  <input type="date" id="leaveEndDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveEndTime" value="18:00" onchange="calculateLeaveHours()">
  <input type="number" id="leaveHours" placeholder="請假時數" style="width:80px" readonly>
  <button id="submitLeaveBtn" onclick="submitLeave()">送出請假</button>
  <button onclick="window.open('https://excdl.github.io/leave-and-sign/','_blank')">查看請假 | 簽核</button>
</div>

<script>
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzjVxox9cxg80tuh9XtCZGSrqT6lhIEmnJRZ6dMF-fSYfLqilO1Kmxaq4bYrBOgMzo/exec";
  let userId = "";
  let userName = "";

  // ========================
  // 初始化 LIFF，獲取 LINE ID 和用戶資料
  // ========================
  async function initLIFF() {
    try {
      await liff.init({ liffId: "2008786085-L1CtKqqv" });
      if (!liff.isLoggedIn()) await liff.login();  // 如果未登錄，則引導登錄

      const profile = await liff.getProfile();
      userId = profile.userId;  // 這是用戶的 LINE ID
      userName = profile.displayName;  // 用戶的顯示名稱

      document.getElementById("userInfo").textContent = `${userName} 您好`;

      // 自動填入員工姓名
      document.getElementById("leaveName").value = userName;

    } catch (err) {
      console.error(err);
      document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
    }
  }

  // ========================
  // 計算請假時數（簡單計算：結束時間 - 開始時間）
  // ========================
  function calculateLeaveHours() {
    const startDate = document.getElementById("leaveStartDate").value;
    const startTime = document.getElementById("leaveStartTime").value;
    const endDate = document.getElementById("leaveEndDate").value;
    const endTime = document.getElementById("leaveEndTime").value;

    if (!startDate || !startTime || !endDate || !endTime) return;

    const start = new Date(`${startDate}T${startTime}:00`);
    const end = new Date(`${endDate}T${endTime}:00`);
    
    const diffInMs = end - start;
    const hours = (diffInMs / (1000 * 60 * 60)).toFixed(2);  // 以小時為單位計算

    document.getElementById("leaveHours").value = hours;  // 顯示請假時數
  }

  // ========================
  // 提交請假申請
  // ========================
  async function submitLeave() {
    const leaveType = document.getElementById("leaveType").value;
    const leaveReason = document.getElementById("leaveReason").value;
    const leaveStartDate = document.getElementById("leaveStartDate").value;
    const leaveStartTime = document.getElementById("leaveStartTime").value;
    const leaveEndDate = document.getElementById("leaveEndDate").value;
    const leaveEndTime = document.getElementById("leaveEndTime").value;
    const leaveHours = document.getElementById("leaveHours").value;

    if (!leaveStartDate || !leaveStartTime || !leaveEndDate || !leaveEndTime || !leaveReason) {
      return Swal.fire({ icon: "info", title: "請填完整資料", timer: 1500, showConfirmButton: false });
    }

    try {
      const res = await fetch(API_ENDPOINT, {
        method: "POST",
        body: JSON.stringify({
          action: "leave",
          userId,
          userName,
          date: leaveStartDate,
          startTime: leaveStartTime,
          endTime: leaveEndTime,
          leaveType,
          leaveReason,
          leaveHours
        })
      });

      const data = await res.json();
      Swal.fire({ icon: "success", title: data.message || "請假申請完成", timer: 1500, showConfirmButton: false });

      // 重設表單
      document.getElementById("leaveReason").value = "";
      document.getElementById("leaveStartDate").value = "";
      document.getElementById("leaveStartTime").value = "09:00";
      document.getElementById("leaveEndDate").value = "";
      document.getElementById("leaveEndTime").value = "18:00";
      document.getElementById("leaveHours").value = "";

    } catch (err) {
      console.error(err);
      Swal.fire({ icon: "error", title: "請假申請失敗", timer: 1500, showConfirmButton: false });
    }
  }

  // 啟動 LIFF
  window.onload = initLIFF;
</script>

</body>
</html>
