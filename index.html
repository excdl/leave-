<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    input, button, select { padding: 5px; margin: 5px; }
    .waiting { color: orange; font-weight: bold; }
    .controls { padding: 20px; border: 1px solid #ccc; margin-top: 20px; }
    .badge-未簽核 { background-color: red; color: white; padding: 5px 10px; border-radius: 5px; }
    .badge-簽核中 { background-color: orange; color: white; padding: 5px 10px; border-radius: 5px; }
    .badge-已簽核 { background-color: green; color: white; padding: 5px 10px; border-radius: 5px; }
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<!-- 請假申請區域 -->
<div class="controls">
  <input id="leaveName" placeholder="員工姓名" readonly>
  <select id="leaveType">
    <option>特休</option>
    <option>事假</option>
    <option>病假</option>
    <option>公假</option>
    <option>婚假</option>
    <option>喪假</option>
    <option>生理假</option>
  </select>
  <input id="leaveReason" placeholder="事由">
  <input type="date" id="leaveStartDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveStartTime" value="09:00" onchange="calculateLeaveHours()">
  <input type="date" id="leaveEndDate" onchange="calculateLeaveHours()">
  <input type="time" id="leaveEndTime" value="18:00" onchange="calculateLeaveHours()">
  <input type="number" id="leaveHours" placeholder="請假時數" style="width:80px" readonly>
  <button id="submitLeaveBtn" onclick="submitLeave()">送出請假</button>
</div>

<!-- 顯示請假紀錄表格 -->
<table>
  <thead>
    <tr>
      <th>員工姓名</th>
      <th>假別</th>
      <th>事由</th>
      <th>起始日期</th>
      <th>起始時間</th>
      <th>終止日期</th>
      <th>終止時間</th>
      <th>請假時數</th>
      <th>簽核狀態</th> <!-- 新增簽核狀態欄位 -->
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan="9">載入中...</td></tr>
  </tbody>
</table>

<script>
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbzN5EWz9SO9pDQ55qZerw9x2bqBq9_uXmtmPnlCrscF20Oau7fGARO8j8zs8fFEunhx/exec";
  let userId = "";
  let userName = "";

  // 初始化 LIFF，獲取 LINE ID 和用戶資料
  async function initLIFF() {
    try {
      await liff.init({ liffId: "2008786085-L1CtKqqv" });
      if (!liff.isLoggedIn()) await liff.login();  // 如果未登錄，則引導登錄

      const profile = await liff.getProfile();
      userId = profile.userId;  // 這是用戶的 LINE ID
      userName = profile.displayName;  // 用戶的顯示名稱

      document.getElementById("userInfo").textContent = `${userName} 您好`;

      // 自動填入員工姓名
      document.getElementById("leaveName").value = userName;

      loadLeaveRecords();  // 直接載入請假紀錄

    } catch (err) {
      console.error("LIFF 初始化錯誤", err);
      document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
    }
  }

  // 載入請假紀錄
  async function loadLeaveRecords() {
    const tbody = document.getElementById("leaveRecordTable");
    tbody.innerHTML = "<tr><td colspan='9'>載入中...</td></tr>";

    try {
      const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}`);
      const data = await res.json();
      console.log(data);  // 日誌：查看 API 返回的數據

      if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='9'>無請假紀錄</td></tr>";
        return;
      }

      const fragment = document.createDocumentFragment();
      data.forEach(r => {
        const row = document.createElement("tr");

        const formatDate = (dateStr) => {
          const date = new Date(dateStr);
          return `${date.getFullYear()}-${('0' + (date.getMonth() + 1)).slice(-2)}-${('0' + date.getDate()).slice(-2)}`;
        };

        const formatTime = (timeStr) => {
          const time = new Date(timeStr);
          return `${('0' + time.getHours()).slice(-2)}:${('0' + time.getMinutes()).slice(-2)}`;
        };

        // 根據簽核狀態動態顯示顏色
        let signStatusClass = '';
        let signStatusText = r.signStatus || '未簽核';
        if (signStatusText === '未簽核') signStatusClass = 'badge-未簽核';
        else if (signStatusText === '簽核中') signStatusClass = 'badge-簽核中';
        else if (signStatusText === '已簽核') signStatusClass = 'badge-已簽核';

        row.innerHTML = `
          <td>${r.userName}</td>
          <td>${r.leaveType}</td>
          <td>${r.leaveReason}</td>
          <td>${formatDate(r.startDate)}</td>
          <td>${formatTime(r.startTime)}</td>
          <td>${formatDate(r.endDate)}</td>
          <td>${formatTime(r.endTime)}</td>
          <td>${r.leaveHours}</td>
          <td><span class="${signStatusClass}">${signStatusText}</span></td> <!-- 顯示簽核狀態 -->
        `;
        fragment.appendChild(row);
      });
      tbody.innerHTML = "";
      tbody.appendChild(fragment);

    } catch (err) {
      console.error("讀取請假紀錄失敗:", err);
      tbody.innerHTML = "<tr><td colspan='9'>讀取失敗</td></tr>";
    }
  }

  // 初始化 LIFF
  window.onload = initLIFF;
</script>

</body>
</html>
