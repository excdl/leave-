<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>請假紀錄</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    input, button, select { padding: 5px; margin: 5px; }
    .waiting { color: orange; font-weight: bold; }
    .controls { padding: 20px; border: 1px solid #ccc; margin-top: 20px; }
  </style>
</head>
<body>

<h2 id="userInfo">載入中...</h2>

<!-- 顯示請假紀錄表格 -->
<table>
  <thead>
    <tr>
      <th>員工姓名</th>
      <th>假別</th>
      <th>事由</th>
      <th>起始日期</th>
      <th>起始時間</th>
      <th>終止日期</th>
      <th>終止時間</th>
      <th>請假時數</th>
    </tr>
  </thead>
  <tbody id="leaveRecordTable">
    <tr><td colspan="8">載入中...</td></tr>
  </tbody>
</table>

<script>
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbyW2VS21DmW0pzSaF7xlsWm9Lnij-lBV1aJYnfBUVHJzIn3zErCdiPDHvt9-Vfd-773/exec";
  let userId = "";
  let userName = "";

  // 初始化 LIFF，獲取 LINE ID 和用戶資料
  async function initLIFF() {
    try {
      await liff.init({ liffId: "2008786085-L1CtKqqv" });
      if (!liff.isLoggedIn()) await liff.login();  // 如果未登錄，則引導登錄

      const profile = await liff.getProfile();
      userId = profile.userId;  // 這是用戶的 LINE ID
      userName = profile.displayName;  // 用戶的顯示名稱

      document.getElementById("userInfo").textContent = `${userName} 您好`;

      loadLeaveRecords();  // 直接載入請假紀錄

    } catch (err) {
      console.error("LIFF 初始化錯誤", err);
      document.getElementById("userInfo").textContent = "無法取得使用者資訊，請在 LINE 打開此頁面。";
    }
  }

  // 載入請假紀錄（顯示最近兩個月）
  async function loadLeaveRecords() {
    const tbody = document.getElementById("leaveRecordTable");
    tbody.innerHTML = "<tr><td colspan='8'>載入中...</td></tr>";

    // 計算兩個月前的日期
    const startDate = new Date();
    startDate.setMonth(startDate.getMonth() - 2);  // 設定為兩個月前
    const formattedStartDate = `${startDate.getFullYear()}/${('0' + (startDate.getMonth() + 1)).slice(-2)}/${('0' + startDate.getDate()).slice(-2)}`;

    try {
      const res = await fetch(`${API_ENDPOINT}?action=getLeaveRecords&userId=${userId}&start=${formattedStartDate}`);
      const data = await res.json();

      if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='8'>無請假紀錄</td></tr>";
        return;
      }

      const fragment = document.createDocumentFragment();
      data.forEach(r => {
        const row = document.createElement("tr");

        // 格式化日期
        const formatDate = (dateStr) => {
          const date = new Date(dateStr);
          return `${date.getFullYear()}/${('0' + (date.getMonth() + 1)).slice(-2)}/${('0' + date.getDate()).slice(-2)}`;
        };

        // 格式化時間
        const formatTime = (timeStr) => {
          const time = new Date(timeStr);
          return `${('0' + time.getHours()).slice(-2)}:${('0' + time.getMinutes()).slice(-2)}`;
        };

        row.innerHTML = `
          <td>${r.userName}</td>
          <td>${r.leaveType}</td>
          <td>${r.leaveReason}</td>
          <td>${formatDate(r.startDate)}</td>
          <td>${formatTime(r.startTime)}</td>
          <td>${formatDate(r.endDate)}</td>
          <td>${formatTime(r.endTime)}</td>
          <td>${r.leaveHours}</td>
        `;
        fragment.appendChild(row);
      });
      tbody.innerHTML = "";
      tbody.appendChild(fragment);

    } catch (err) {
      console.error("讀取請假紀錄失敗:", err);
      tbody.innerHTML = "<tr><td colspan='8'>讀取失敗</td></tr>";
    }
  }

  // 初始化 LIFF
  window.onload = initLIFF;
</script>

</body>
</html>
